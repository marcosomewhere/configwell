[Database]
; Primärer Datenbankserver
Host=localhost
Port=3306
Name=webapp_db
User=root
; Passwort für Datenbankzugriff
Password=mysecretpw

[Application]
; Name der Anwendung
AppName=MeineApp
; Versionsnummer
Version=2.1.0
; Debug-Ausgaben einschalten
Debug=false
; Maximale Anzahl gleichzeitiger Benutzer
MaxUsers=100

[Logging]
; Pfad zur Logdatei
LogFile=C:\Logs\app.log
; Minimaler Log-Level: DEBUG, INFO, WARN, ERROR
LogLevel=INFO
; Maximale Größe der Logdatei in MB
MaxLogSize=10
; Protokollrotation aktivieren
RotateLogs=true

[Cache]
Enabled=true
; Cache-Ablaufzeit in Sekunden
TTL=1800
MaxEntries=1000
