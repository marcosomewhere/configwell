# Nginx-/Linux-style Konfigurationsdatei (.conf)
# Kommentare mit # werden ignoriert

# Server
server.host=localhost
server.port=8080
server.workers=4
server.debug=false

# Datenbank
database.url=jdbc:postgresql://localhost:5432/myapp
database.username=appuser
database.password=geheim123
database.pool.min=2
database.pool.max=20
database.timeout=30000

# Logging
log.level=INFO
log.file=/var/log/myapp/app.log
log.rotation=daily
log.keep_days=14

# Cache
cache.enabled=true
cache.host=127.0.0.1
cache.port=6379
cache.ttl=3600

# Sicherheit
security.https.enabled=true
security.session.timeout=1800
security.cors.allowed_origins=https://example.com,https://api.example.com
