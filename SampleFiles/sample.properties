# Datenbankverbindung
# Hostname oder IP-Adresse des Datenbankservers
db.host=localhost

# Portnummer des Datenbankservers
db.port=5432

# Name der Datenbank
db.name=myapp_production

# Datenbankbenutzer
db.user=appuser

# Datenbankpasswort (bitte sicher aufbewahren!)
db.password=secret123

# Maximale Verbindungen im Pool
db.pool.max=20

# Anwendungseinstellungen
# Debug-Modus aktivieren (true/false)
app.debug=false

# Protokollierungsstufe
app.log.level=INFO

# Maximale Upload-Dateigröße in MB
app.upload.maxsize=50

# Wartungsmodus aktivieren
app.maintenance=false

# Cache-Einstellungen
cache.enabled=true
cache.ttl.seconds=3600
